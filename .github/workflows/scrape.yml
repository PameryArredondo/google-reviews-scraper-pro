name: Scrape Google Reviews
on:
  schedule:
    - cron: '15 13 * * 1'  # Every Monday at 8:15am EST
    - cron: '15 13 * * 5'  # Every Friday at 8:15am EST
  workflow_dispatch:
jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Chrome
        run: |
          wget -q -O - https://dl.google.com/linux/linux_signing_key.pub | sudo apt-key add -
          echo "deb [arch=amd64] http://dl.google.com/linux/chrome/deb/ stable main" | sudo tee /etc/apt/sources.list.d/google-chrome.list
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scraper
        run: python start.py scrape

      - name: Commit and push reviews.db
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f reviews.db
          git diff --staged --quiet && echo "No changes to commit" && exit 0
          git commit -m "Auto scrape $(date +'%Y-%m-%d')"
          # Fetch remote and rebase only reviews.db on top
          git fetch origin master
          git rebase origin/master -X ours
          git push origin master